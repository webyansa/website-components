<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>طلباتي | بوابة الجمعية</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/fonts/fontawesome/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/portal.css" />
</head>
<body>

<div data-portal-shell data-page="requests" data-title="طلباتي" data-subtitle="متابعة جميع طلبات جمعيتك">

  <div class="ppage-header">
    <div>
      <div class="pbreadcrumb"><a href="index.html">لوحة التحكم</a><i class="fa-solid fa-chevron-left"></i><span>طلباتي</span></div>
      <h1>طلباتي</h1>
      <p>قدّم طلب خدمة جديدة وتابع حالة طلباتك السابقة.</p>
    </div>
    <div class="ppage-header-actions">
      <button class="pbtn pbtn-primary" data-modal-open="newRequestModal"><i class="fa-solid fa-plus"></i> طلب جديد</button>
    </div>
  </div>

  <div class="pgrid pgrid-4" style="margin-bottom:20px;">
    <div class="pcard"><div class="pcard-stat"><div class="pstat-icon is-primary"><i class="fa-solid fa-file-lines"></i></div><div><p class="pstat-label">إجمالي الطلبات</p><p class="pstat-value">24</p></div></div></div>
    <div class="pcard"><div class="pcard-stat"><div class="pstat-icon is-warning"><i class="fa-solid fa-hourglass-half"></i></div><div><p class="pstat-label">قيد المراجعة</p><p class="pstat-value">3</p></div></div></div>
    <div class="pcard"><div class="pcard-stat"><div class="pstat-icon is-success"><i class="fa-solid fa-circle-check"></i></div><div><p class="pstat-label">مكتملة</p><p class="pstat-value">18</p></div></div></div>
    <div class="pcard"><div class="pcard-stat"><div class="pstat-icon is-danger"><i class="fa-solid fa-circle-xmark"></i></div><div><p class="pstat-label">مرفوضة</p><p class="pstat-value">3</p></div></div></div>
  </div>

  <div class="ptable-wrap">
    <div class="ptable-toolbar">
      <div class="ptable-search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="ابحث برقم الطلب أو نوع الخدمة..." />
      </div>
      <div class="ptable-actions">
        <select class="pselect pbtn-sm" style="height:40px; font-size:13px;">
          <option>كل الحالات</option><option>قيد المراجعة</option><option>نشط</option><option>مكتمل</option><option>مرفوض</option>
        </select>
        <button class="pbtn pbtn-outline pbtn-sm"><i class="fa-solid fa-filter"></i> تصفية</button>
        <button class="pbtn pbtn-ghost pbtn-sm"><i class="fa-solid fa-download"></i> تصدير</button>
      </div>
    </div>
    <div style="overflow-x:auto;">
      <table class="ptable" id="reqTable">
        <thead>
          <tr>
            <th>رقم الطلب</th><th>نوع الخدمة</th><th>تاريخ الإنشاء</th><th>الحالة</th><th>آخر تحديث</th><th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="ppagination">
      <div>عرض 1–6 من 24 طلب</div>
      <div class="ppagination-nav">
        <button><i class="fa-solid fa-chevron-right"></i></button>
        <button class="is-active">1</button><button>2</button><button>3</button><button>4</button>
        <button><i class="fa-solid fa-chevron-left"></i></button>
      </div>
    </div>
  </div>

</div>

<!-- New request modal -->
<div class="pmodal-overlay" id="newRequestModal">
  <div class="pmodal pmodal-lg">
    <header class="pmodal-header"><h3><i class="fa-solid fa-plus"></i> طلب جديد</h3><button class="pmodal-close" data-modal-close>&times;</button></header>
    <div class="pmodal-body">
      <div class="pfield"><label class="plabel">نوع الخدمة <span class="req">*</span></label>
        <select class="pselect"><option>اختر نوع الخدمة</option><option>طلب منحة تشغيلية</option><option>استشارة حوكمة</option><option>برنامج تدريبي</option><option>طلب موارد</option></select>
      </div>
      <div class="pfield"><label class="plabel">عنوان الطلب <span class="req">*</span></label><input class="pinput" placeholder="اكتب عنواناً واضحاً" /></div>
      <div class="pfield"><label class="plabel">وصف الطلب</label><textarea class="ptextarea" placeholder="اشرح تفاصيل احتياجك..."></textarea></div>
      <div class="pfield"><label class="plabel">مرفقات (اختياري)</label>
        <label class="pfile"><i class="fa-solid fa-cloud-arrow-up"></i><p>اسحب الملفات هنا أو اضغط للاختيار</p><input type="file" hidden></label>
      </div>
    </div>
    <footer class="pmodal-footer">
      <button class="pbtn pbtn-outline" data-modal-close>إلغاء</button>
      <button class="pbtn pbtn-primary" data-modal-close><i class="fa-solid fa-paper-plane"></i> إرسال الطلب</button>
    </footer>
  </div>
</div>

<script src="assets/js/portal-data.js"></script>
<script src="assets/js/portal.js"></script>
<script>
  const tb = document.querySelector('#reqTable tbody');
  tb.innerHTML = PortalData.requests.map(r => `
    <tr>
      <td class="ptable-id">${r.id}</td>
      <td>${r.type}</td>
      <td>${r.date}</td>
      <td>${PortalRender.statusBadge(r.status)}</td>
      <td class="pmuted" style="font-size:12.5px;">${r.updated}</td>
      <td class="ptable-actions-cell">
        <a href="request-details.html" class="pbtn pbtn-ghost pbtn-sm"><i class="fa-solid fa-eye"></i> عرض</a>
      </td>
    </tr>`).join('');
</script>
</body>
</html>
