<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم الدفع بنجاح — ويبيان</title>
    <meta name="description" content="تمت عملية الدفع بنجاح. شكراً لاشتراكك في ويبيان.">
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/webyan.css">
    <style>
        /* ══ Payment Result Pages ══ */
        .pr-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #f0fbff 0%, var(--wb-bg) 50%, #f0f4ff 100%);
        }
        .pr-card {
            background: var(--wb-white);
            border-radius: var(--wb-radius-lg);
            box-shadow: var(--wb-shadow-lg);
            max-width: 520px;
            width: 100%;
            overflow: hidden;
            animation: prSlideUp .6s cubic-bezier(.4,0,.2,1);
        }
        @keyframes prSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hero Banner */
        .pr-hero {
            padding: 48px 32px 36px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .pr-hero.success {
            background: linear-gradient(135deg, var(--wb-success), #2f855a);
        }
        .pr-hero.error {
            background: linear-gradient(135deg, var(--wb-danger), #c53030);
        }
        .pr-hero::before {
            content: '';
            position: absolute;
            top: -40%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle, rgba(255,255,255,.08) 0%, transparent 70%);
        }

        /* Animated Icon */
        .pr-icon {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: rgba(255,255,255,.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: prPulse 2s ease-in-out infinite;
            backdrop-filter: blur(4px);
        }
        @keyframes prPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,.3); }
            50% { box-shadow: 0 0 0 16px rgba(255,255,255,0); }
        }
        .pr-icon svg {
            width: 44px;
            height: 44px;
            stroke: #fff;
            stroke-width: 2.5;
            fill: none;
            animation: prCheck .5s .3s cubic-bezier(.4,0,.2,1) both;
        }
        @keyframes prCheck {
            from { stroke-dashoffset: 60; opacity: 0; }
            to { stroke-dashoffset: 0; opacity: 1; }
        }
        .pr-icon svg.check-icon { stroke-dasharray: 60; }

        .pr-hero h1 {
            color: #fff;
            font-size: 1.6rem;
            font-weight: 800;
            margin: 0;
            position: relative;
        }

        /* Status Message */
        .pr-status {
            padding: 20px 28px 0;
            text-align: center;
        }
        .pr-status-msg {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: .95rem;
            font-weight: 600;
        }
        .pr-status-msg.success {
            background: #f0fff4;
            color: var(--wb-success);
            border: 1px solid #c6f6d5;
        }
        .pr-status-msg.error {
            background: #fff5f5;
            color: var(--wb-danger);
            border: 1px solid #fed7d7;
        }

        /* Receipt Sent */
        .pr-receipt-note {
            margin: 16px 28px 0;
            padding: 12px 20px;
            background: var(--wb-primary-light);
            border-radius: var(--wb-radius);
            text-align: center;
            font-size: .88rem;
            color: var(--wb-primary-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Details Card */
        .pr-details {
            margin: 20px 28px;
            border: 1px solid var(--wb-border-light);
            border-radius: var(--wb-radius);
            overflow: hidden;
        }
        .pr-details-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--wb-border-light);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            font-weight: 700;
            font-size: .95rem;
            color: var(--wb-secondary);
        }
        .pr-details-header svg {
            width: 18px;
            height: 18px;
            stroke: var(--wb-primary);
        }
        .pr-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid var(--wb-border-light);
            font-size: .9rem;
        }
        .pr-row:last-child { border-bottom: none; }
        .pr-row .label {
            color: var(--wb-text-muted);
            font-size: .85rem;
        }
        .pr-row .value {
            font-weight: 600;
            color: var(--wb-text);
            direction: ltr;
            text-align: left;
        }
        .pr-row .value.amount {
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--wb-secondary);
        }
        .pr-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: .8rem;
            font-weight: 700;
        }
        .pr-badge.success {
            background: #f0fff4;
            color: var(--wb-success);
        }
        .pr-badge.error {
            background: #fff5f5;
            color: var(--wb-danger);
        }

        /* Buttons */
        .pr-actions {
            padding: 0 28px 28px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .pr-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            border-radius: var(--wb-radius);
            font-family: var(--wb-font);
            font-size: .95rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--wb-transition);
            text-decoration: none;
            border: none;
        }
        .pr-btn svg { width: 20px; height: 20px; }
        .pr-btn-primary {
            background: linear-gradient(135deg, var(--wb-primary), var(--wb-primary-dark));
            color: #fff;
            box-shadow: 0 4px 16px rgba(36,194,236,.25);
        }
        .pr-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(36,194,236,.35);
            color: #fff;
        }
        .pr-btn-outline {
            background: var(--wb-white);
            color: var(--wb-text);
            border: 1.5px solid var(--wb-border);
        }
        .pr-btn-outline:hover {
            border-color: var(--wb-primary);
            color: var(--wb-primary);
            background: var(--wb-primary-light);
        }

        /* Footer */
        .pr-footer {
            padding: 20px 28px;
            border-top: 1px solid var(--wb-border-light);
            text-align: center;
        }
        .pr-secure {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: .8rem;
            color: var(--wb-text-muted);
        }
        .pr-secure svg {
            width: 16px;
            height: 16px;
            stroke: var(--wb-text-muted);
        }

        /* Confetti */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }
        .confetti {
            position: absolute;
            top: -10px;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 576px) {
            .pr-wrapper { padding: 20px 12px; }
            .pr-hero { padding: 36px 20px 28px; }
            .pr-hero h1 { font-size: 1.3rem; }
            .pr-details, .pr-actions, .pr-receipt-note { margin-inline: 16px; }
            .pr-row { flex-direction: column; gap: 4px; text-align: center; }
            .pr-row .label { font-size: .8rem; }
        }
    </style>
  <link rel="stylesheet" href="css/webyan-preloader.css" />

  <script src="js/webyan-theme.js"></script>
</head>
<body class="wb-page">
  <div class="wy-preloader" id="wyPreloader" aria-hidden="true">
    <div class="wy-pixel-grid" role="presentation">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
  </div>

            <!-- Actions -->
            <div class="pr-actions">
                <a href="#" class="pr-btn pr-btn-primary" onclick="downloadReceipt()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    تحميل الإيصال
                </a>
                <a href="checkout.html" class="pr-btn pr-btn-outline">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 109-9"/><polyline points="3 3 3 12 12 12"/></svg>
                    العودة إلى القائمة
                </a>
                <a href="#" class="pr-btn pr-btn-outline">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                    عرض طلباتي
                </a>
            </div>

            <!-- Secure Footer -->
            <div class="pr-footer">
                <span class="pr-secure">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    معاملات آمنة ومشفرة SSL
                </span>
            </div>
        </div>
    </div>

    <script>
        // Generate transaction data
        function generateTxnId() {
            return [...Array(8)].map(() => Math.random().toString(16).charAt(2)).join('') + '-' +
                   [...Array(4)].map(() => Math.random().toString(16).charAt(2)).join('') + '-' +
                   [...Array(4)].map(() => Math.random().toString(16).charAt(2)).join('');
        }

        document.getElementById('txnNumber').textContent = generateTxnId();
        document.getElementById('txnDate').textContent = new Date().toLocaleString('ar-SA', {
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit'
        });

        // Get amount from URL params or default
        const params = new URLSearchParams(window.location.search);
        const amount = params.get('amount') || '1,200';
        const plan = params.get('plan') || 'الباقة الاحترافية';
        document.getElementById('txnAmount').textContent = amount + ' ر.س';
        document.getElementById('planName').textContent = plan;

        function downloadReceipt() {
            alert('جاري تحميل الإيصال...');
        }

        // Confetti
        (function() {
            const container = document.getElementById('confetti');
            const colors = ['#24c2ec', '#263c84', '#38a169', '#e6a817', '#f56565', '#9f7aea'];
            for (let i = 0; i < 60; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + '%';
                c.style.background = colors[Math.floor(Math.random() * colors.length)];
                c.style.width = (6 + Math.random() * 8) + 'px';
                c.style.height = (6 + Math.random() * 8) + 'px';
                c.style.animationDuration = (2 + Math.random() * 3) + 's';
                c.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(c);
            }
            setTimeout(() => container.remove(), 6000);
        })();
    </script>
  <script src="js/webyan-preloader.js"></script>
</body>
</html>
