<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الرسائل | بوابة العملاء — ويبيان</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/fonts/fontawesome/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/portal.css" />
</head>
<body>

<div data-portal-shell data-page="messages" data-title="الرسائل" data-subtitle="التنبيهات والتحديثات من فريق ويبيان">

  <div class="ppage-header">
    <div>
      <div class="pbreadcrumb"><a href="index.html">لوحة التحكم</a><i class="fa-solid fa-chevron-left"></i><span>الرسائل</span></div>
      <h1>الرسائل</h1>
      <p>تنبيهات ورسائل عامة مرتبطة باشتراكاتك، فواتيرك، مشاريعك، ودومينك.</p>
    </div>
    <div class="ppage-header-actions">
      <button class="pbtn pbtn-primary" data-modal-open="newMsgModal"><i class="fa-solid fa-plus"></i> رسالة جديدة</button>
    </div>
  </div>

  <div class="pgrid pgrid-4" style="margin-bottom:20px;">
    <div class="pcard"><div class="pcard-stat"><div class="pstat-icon is-primary"><i class="fa-solid fa-envelope"></i></div><div><p class="pstat-label">إجمالي الرسائل</p><p class="pstat-value">5</p></div></div></div>
    <div class="pcard"><div class="pcard-stat"><div class="pstat-icon is-warning"><i class="fa-solid fa-envelope-open-text"></i></div><div><p class="pstat-label">غير مقروءة</p><p class="pstat-value">3</p></div></div></div>
    <div class="pcard"><div class="pcard-stat"><div class="pstat-icon is-info"><i class="fa-solid fa-file-invoice"></i></div><div><p class="pstat-label">تخص الفواتير</p><p class="pstat-value">1</p></div></div></div>
    <div class="pcard"><div class="pcard-stat"><div class="pstat-icon is-success"><i class="fa-solid fa-diagram-project"></i></div><div><p class="pstat-label">تخص المشاريع</p><p class="pstat-value">1</p></div></div></div>
  </div>

  <div class="pcard">
    <div class="pcard-header">
      <h3><i class="fa-solid fa-inbox" style="color:var(--p-primary); margin-inline-end:6px;"></i> صندوق الوارد</h3>
      <div style="display:flex; gap:6px;">
        <button class="pbtn pbtn-ghost pbtn-sm">الكل</button>
        <button class="pbtn pbtn-ghost pbtn-sm">غير المقروءة</button>
      </div>
    </div>
    <div class="pmsg-list-v2" id="msgList"></div>
  </div>
</div>

<!-- New message modal -->
<div class="pmodal-overlay" id="newMsgModal">
  <div class="pmodal">
    <header class="pmodal-header"><h3><i class="fa-solid fa-plus"></i> رسالة جديدة</h3><button class="pmodal-close" data-modal-close>&times;</button></header>
    <div class="pmodal-body">
      <div class="pfield"><label class="plabel">الموضوع <span class="req">*</span></label><input class="pinput" placeholder="عنوان الرسالة" /></div>
      <div class="pfield"><label class="plabel">مرتبط بـ (اختياري)</label>
        <select class="pselect">
          <option>لا شيء</option>
          <option>SUB-2026-0012</option>
          <option>PRJ-2026-014</option>
          <option>INV-2026-0001</option>
        </select></div>
      <div class="pfield"><label class="plabel">المحتوى <span class="req">*</span></label><textarea class="ptextarea" style="min-height:140px;"></textarea></div>
    </div>
    <footer class="pmodal-footer">
      <button class="pbtn pbtn-outline" data-modal-close>إلغاء</button>
      <button class="pbtn pbtn-primary" data-modal-close><i class="fa-solid fa-paper-plane"></i> إرسال</button>
    </footer>
  </div>
</div>

<script src="assets/js/portal-data.js"></script>
<script src="assets/js/portal.js"></script>
<script>
  const iconMap = {
    invoice: {i:'fa-file-invoice',   c:'is-warning', label:'فاتورة'},
    project: {i:'fa-diagram-project', c:'is-info',    label:'تحديث مشروع'},
    domain:  {i:'fa-globe',           c:'is-danger',  label:'تنبيه دومين'},
    ticket:  {i:'fa-headset',         c:'is-primary', label:'تنبيه دعم'},
    general: {i:'fa-envelope',        c:'is-success', label:'رسالة عامة'},
    subscription: {i:'fa-crown',      c:'is-violet',  label:'تحديث اشتراك'},
  };
  document.getElementById('msgList').innerHTML = PortalData.messages.map(m => {
    const meta = iconMap[m.type] || iconMap.general;
    return `
      <div class="pmsg-row ${m.read?'':'is-unread'}">
        <div class="pmsg-row-icon pstat-icon ${meta.c}"><i class="fa-solid ${meta.i}"></i></div>
        <div class="pmsg-row-body">
          <div class="pmsg-row-title">${m.title}</div>
          <div class="pmsg-row-meta"><span>${meta.label}</span><span>·</span><span>${m.id}</span></div>
        </div>
        <div class="pmsg-row-time">${m.date}</div>
      </div>`;
  }).join('');
</script>
</body>
</html>
