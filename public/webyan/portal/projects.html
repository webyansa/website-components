<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مشاريعي | بوابة العملاء — ويبيان</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/fonts/fontawesome/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/portal.css" />
</head>
<body>

<div data-portal-shell data-page="projects" data-title="مشاريعي" data-subtitle="تنفيذ اشتراكاتك في منصة ويبيان">

  <div class="ppage-header">
    <div>
      <div class="pbreadcrumb"><a href="index.html">لوحة التحكم</a><i class="fa-solid fa-chevron-left"></i><span>مشاريعي</span></div>
      <h1>مشاريعي</h1>
      <p>كل مشروع يمثّل رحلة تنفيذ اشتراكك — من الاستلام حتى الإطلاق.</p>
    </div>
  </div>

  <div class="pgrid pgrid-3" style="margin-bottom:20px;">
    <div class="pcard"><div class="pcard-stat"><div class="pstat-icon is-primary"><i class="fa-solid fa-diagram-project"></i></div><div><p class="pstat-label">إجمالي المشاريع</p><p class="pstat-value">1</p></div></div></div>
    <div class="pcard"><div class="pcard-stat"><div class="pstat-icon is-info"><i class="fa-solid fa-play"></i></div><div><p class="pstat-label">قيد التنفيذ</p><p class="pstat-value">1</p></div></div></div>
    <div class="pcard"><div class="pcard-stat"><div class="pstat-icon is-success"><i class="fa-solid fa-flag-checkered"></i></div><div><p class="pstat-label">مكتملة</p><p class="pstat-value">0</p></div></div></div>
  </div>

  <div class="ptable-wrap">
    <div class="ptable-toolbar">
      <div class="ptable-search"><i class="fa-solid fa-magnifying-glass"></i><input placeholder="ابحث في المشاريع..." /></div>
    </div>
    <div style="overflow-x:auto;">
      <table class="ptable" id="prjTable">
        <thead><tr><th>رقم المشروع</th><th>الاسم</th><th>النوع</th><th>الاشتراك</th><th>الدومين</th><th>المرحلة</th><th>التقدّم</th><th>الحالة</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script src="assets/js/portal-data.js"></script>
<script src="assets/js/portal.js"></script>
<script>
  document.querySelector('#prjTable tbody').innerHTML = PortalData.projects.map(p => `
    <tr>
      <td class="ptable-id">${p.id}</td>
      <td><strong>${p.name}</strong><div class="pmuted" style="font-size:11.5px;">أُنشئ: ${p.created}</div></td>
      <td><span class="pchip"><i class="fa-solid fa-cube"></i> ${p.type}</span></td>
      <td>${p.sub}</td>
      <td dir="ltr" style="text-align:right; font-family:'Menlo',monospace; color:var(--p-primary);">${p.domain}</td>
      <td class="pmuted" style="font-size:12.5px;">${p.stage}</td>
      <td style="min-width:120px;"><div class="pprogress"><span style="width:${p.progress}%;"></span></div><div style="font-size:11px; color:var(--p-muted); margin-top:4px;">${p.progress}%</div></td>
      <td>${PortalRender.projStatus(p.status)}</td>
      <td class="ptable-actions-cell"><a href="project-details.html" class="pbtn pbtn-ghost pbtn-sm"><i class="fa-solid fa-eye"></i> عرض</a></td>
    </tr>`).join('');
</script>
</body>
</html>
